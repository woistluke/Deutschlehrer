<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v2 Auf Deutsch — German Conversation Practice</title>
<style>
  :root {
    --bg:#0f1117; --surface:#181c27; --card:#1f2435; --border:#2a3050;
    --amber:#f5a623; --amber-dim:#a86f10; --green:#4caf82; --red:#e05c5c;
    --blue:#5b8dee; --text:#e8e4d9; --muted:#7a829a; --dimmed:#3a4060;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; height:100vh; overflow:hidden; }
  #app { max-width:700px; margin:0 auto; height:100vh; display:flex; flex-direction:column; }
  .serif { font-family:Georgia,'Times New Roman',serif; }
  button { font-family:inherit; }
  input:focus, textarea:focus, select:focus { border-color:var(--amber) !important; outline:none; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  ::-webkit-scrollbar-track { background:transparent; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 6px rgba(245,166,35,.25),0 0 0 12px rgba(245,166,35,.1)} 50%{box-shadow:0 0 0 10px rgba(245,166,35,.35),0 0 0 20px rgba(245,166,35,.05)} }
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════════════
//  Auf Deutsch — Groq cloud edition. Vanilla JS, single file.
// ═══════════════════════════════════════════════════════════════════════════
const C = {
  bg:"#0f1117", surface:"#181c27", card:"#1f2435", border:"#2a3050",
  amber:"#f5a623", amberDim:"#a86f10", green:"#4caf82", red:"#e05c5c",
  blue:"#5b8dee", text:"#e8e4d9", muted:"#7a829a", dimmed:"#3a4060",
};
const LEVELS = ["A1","A2","B1","B2","C1"];
const TOPICS = ["Greetings & Small Talk","Ordering Food","Shopping","Travel & Directions",
  "Work & Career","Family & Home","Hobbies & Interests","Health & Body","Weather","Free Conversation"];

const state = {
  screen: "setup",
  groqKey: localStorage.getItem("groq_key") || "",
  groqModel: localStorage.getItem("groq_model") || "openai/gpt-oss-120b",
  level: "A2",
  topic: "Greetings & Small Talk",
  messages: [],
  loading: false,
  error: "",
  vocab: [],
  missed: JSON.parse(localStorage.getItem("missed_cards") || "[]"),
  flashQueue: [], flashIdx: 0, flashFlipped: false,
  score: { got: 0, missed: 0 },
};

async function callGroq(history, systemPrompt) {
  if (!state.groqKey) throw new Error("Add your Groq API key in setup.");
  const messages = [
    { role: "system", content: systemPrompt },
    ...history.map(m => ({ role: m.role === "model" ? "assistant" : "user", content: m.content })),
  ];
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${state.groqKey}` },
    body: JSON.stringify({
      model: state.groqModel, messages,
      temperature: 0.8, max_tokens: 1000,
      response_format: { type: "json_object" },
    }),
  });
  if (!res.ok) {
    let d = ""; try { const j = await res.json(); d = j.error?.message || JSON.stringify(j); } catch { try { d = await res.text(); } catch {} }
    throw new Error(`Groq ${res.status} — ${d.slice(0,300)}`);
  }
  const data = await res.json();
  const text = data.choices?.[0]?.message?.content;
  if (!text) throw new Error("Empty Groq response.");
  return text;
}

function parseResponse(raw) {
  let clean = raw.trim().replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/, "").trim();
  const first = clean.indexOf("{"), last = clean.lastIndexOf("}");
  if (first !== -1 && last !== -1 && (first > 0 || last < clean.length - 1)) clean = clean.slice(first, last + 1);
  try { return JSON.parse(clean); }
  catch { return { reply: raw, translation: "", corrections: [], tip: "", vocab: [] }; }
}

function buildSystemPrompt(level, topic) {
  return `You are an immersive German conversation partner for a ${level}-level learner. Topic: "${topic}".

Respond ONLY with valid JSON (no markdown, no code fences) matching:
{
  "reply": "<German response, natural for ${level} level>",
  "translation": "<English translation of your reply>",
  "corrections": [{ "wrong": "<user error>", "right": "<correct>", "note": "<brief grammar note>" }],
  "tip": "<one short cultural/grammar insight, or empty string>",
  "vocab": [{ "de": "<German word/phrase>", "en": "<English meaning>" }]
}
Rules:
- reply: natural German only, always end with a question to keep conversation flowing
- corrections: only real errors (max 3), empty array if user was correct
- vocab: 1-3 useful words from YOUR reply
- tip: only if genuinely useful, else ""
- A1/A2: simple words, short sentences. B2/C1: complex grammar and idioms welcome.`;
}

// ── Speech / TTS ────────────────────────────────────────────────────────────
let recognition = null, isListening = false;
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  recognition = new SR();
  recognition.lang = "de-DE"; recognition.continuous = false; recognition.interimResults = false;
  recognition.onresult = (e) => { const t = e.results[0][0].transcript; const ta = document.getElementById("chat-input"); if (ta){ta.value=t;ta.focus();} };
  recognition.onend = () => { isListening = false; updateMicButton(); };
  recognition.onerror = () => { isListening = false; updateMicButton(); };
  return true;
}
function toggleMic() {
  if (!recognition) return;
  if (isListening) { try{recognition.stop();}catch{} isListening=false; }
  else { try{recognition.start();isListening=true;}catch{} }
  updateMicButton();
}
function updateMicButton() {
  const btn = document.getElementById("mic-btn"); if (!btn) return;
  btn.style.background = isListening ? "radial-gradient(circle,#f5a623 0%,#a86f10 100%)" : "radial-gradient(circle,#2a3050 0%,#181c27 100%)";
  btn.style.boxShadow = isListening ? "0 0 0 6px rgba(245,166,35,.25),0 0 0 12px rgba(245,166,35,.1)" : `0 0 0 2px ${C.border}`;
  btn.style.animation = isListening ? "pulse 1.4s infinite" : "none";
  const fill = isListening ? "#0f1117" : C.muted;
  btn.querySelectorAll("svg *").forEach(el => { if (el.tagName==="rect") el.setAttribute("fill",fill); else el.setAttribute("stroke",fill); });
}
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\[.*?\]/g,"").trim());
  u.lang = "de-DE"; u.rate = 0.9;
  const v = window.speechSynthesis.getVoices().find(x => x.lang.startsWith("de"));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function collectVocab(){ const all=state.messages.flatMap(m=>m.vocab||[]); state.vocab=[...new Map(all.map(v=>[v.de,v])).values()]; }
function saveMissed(){ localStorage.setItem("missed_cards", JSON.stringify(state.missed)); }
function persist(){ localStorage.setItem("groq_key", state.groqKey); localStorage.setItem("groq_model", state.groqModel); }

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  if (state.screen === "setup") app.innerHTML = renderSetup();
  else if (state.screen === "chat") app.innerHTML = renderChat();
  else if (state.screen === "flashcards") app.innerHTML = renderFlashcards();
  else if (state.screen === "review") app.innerHTML = renderReview();
  attachHandlers();
  if (state.screen === "chat") { const b=document.getElementById("messages"); if(b)b.scrollTop=b.scrollHeight; updateMicButton(); }
}

function renderSetup() {
  return `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;overflow-y:auto;">
    <div style="max-width:480px;width:100%;padding:28px 0;">
      <div style="text-align:center;margin-bottom:32px;">
        <div class="serif" style="font-size:40px;color:${C.amber};font-weight:700;letter-spacing:-1px;">Auf Deutsch</div>
        <div style="color:${C.muted};font-size:13px;margin-top:6px;letter-spacing:1px;">GERMAN CONVERSATION PRACTICE</div>
      </div>

      <div style="margin-bottom:22px;">
        <div style="color:${C.muted};font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Groq API Key ${state.groqKey?`<span style="color:${C.green};">✓ saved</span>`:""}</div>
        <input id="groq-key" type="password" value="${esc(state.groqKey)}" placeholder="gsk_..." style="width:100%;background:${C.card};border:1px solid ${C.border};border-radius:10px;padding:11px 14px;color:${C.text};font-size:14px;font-family:inherit;" />
        <div style="font-size:12px;color:${C.muted};margin-top:6px;line-height:1.5;">Free key at <a href="https://console.groq.com/keys" target="_blank" style="color:${C.amber};">console.groq.com/keys</a> — stored only on this device.</div>
        <div style="margin-top:10px;"><input id="groq-model" type="text" value="${esc(state.groqModel)}" placeholder="model id" style="width:100%;background:${C.card};border:1px solid ${C.border};border-radius:10px;padding:9px 14px;color:${C.muted};font-size:13px;font-family:inherit;" />
        <div style="font-size:11px;color:${C.dimmed};margin-top:4px;">model id · default openai/gpt-oss-120b</div></div>
      </div>

      ${state.error?`<div style="margin-bottom:18px;background:rgba(224,92,92,.12);border:1px solid ${C.red}44;color:${C.red};padding:10px 12px;border-radius:8px;font-size:13px;">${esc(state.error)}</div>`:""}

      <div style="margin-bottom:20px;">
        <div style="color:${C.muted};font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">Your Level</div>
        <div style="display:flex;gap:8px;">
          ${LEVELS.map(l=>`<button data-level="${l}" style="flex:1;padding:10px 0;border-radius:10px;border:2px solid ${state.level===l?C.amber:C.border};background:${state.level===l?C.amber+"22":C.card};color:${state.level===l?C.amber:C.muted};font-weight:700;font-size:14px;cursor:pointer;">${l}</button>`).join("")}
        </div>
      </div>

      <div style="margin-bottom:28px;">
        <div style="color:${C.muted};font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">Topic</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${TOPICS.map(t=>`<button data-topic="${esc(t)}" style="padding:11px 16px;border-radius:10px;text-align:left;border:1px solid ${state.topic===t?C.amber:C.border};background:${state.topic===t?C.amber+"18":C.card};color:${state.topic===t?C.amber:C.text};font-size:14px;cursor:pointer;">${esc(t)}</button>`).join("")}
        </div>
      </div>

      <button id="start-btn" style="width:100%;padding:16px 0;background:linear-gradient(135deg,${C.amber},${C.amberDim});border:none;border-radius:14px;color:#0f1117;font-weight:700;font-size:17px;cursor:pointer;">Gespräch beginnen →</button>
      <div style="text-align:center;color:${C.muted};font-size:12px;margin-top:8px;">"Start the conversation"</div>
    </div>
  </div>`;
}

function renderChat() {
  const msgs = state.messages.map(renderBubble).join("");
  return `
  <div style="display:flex;flex-direction:column;height:100vh;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid ${C.border};background:${C.surface};">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="back-setup" style="background:none;border:none;color:${C.muted};cursor:pointer;font-size:20px;">←</button>
        <div>
          <div style="font-weight:700;font-size:15px;color:${C.text};">Auf Deutsch</div>
          <div style="font-size:11px;color:${C.muted};">${state.level} · ${esc(state.topic)}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        ${state.vocab.length?`<button id="open-cards" style="background:${C.card};border:1px solid ${C.border};color:${C.amber};border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600;">📚 ${state.vocab.length}</button>`:""}
        ${state.missed.length?`<button id="open-missed" style="background:${C.card};border:1px solid ${C.red}44;color:${C.red};border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600;">🔁 ${state.missed.length}</button>`:""}
      </div>
    </div>
    ${state.error?`<div style="background:rgba(224,92,92,.12);border:1px solid ${C.red}44;color:${C.red};padding:10px 16px;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:12px;"><span style="flex:1;">${esc(state.error)}</span><button id="retry-btn" style="background:${C.red};border:none;color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600;flex-shrink:0;">Retry</button></div>`:""}
    <div id="messages" style="flex:1;overflow-y:auto;padding:20px 16px;">
      ${msgs}
      ${state.loading?renderTyping():""}
    </div>
    <div style="padding:12px 14px;border-top:1px solid ${C.border};background:${C.surface};display:flex;gap:10px;align-items:flex-end;">
      <button id="mic-btn" title="Speak in German" style="width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;background:radial-gradient(circle,#2a3050 0%,#181c27 100%);box-shadow:0 0 0 2px ${C.border};display:flex;align-items:center;justify-content:center;transition:all .3s;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" fill="${C.muted}"/><path d="M5 10a7 7 0 0014 0" stroke="${C.muted}" stroke-width="2" stroke-linecap="round" fill="none"/><line x1="12" y1="17" x2="12" y2="21" stroke="${C.muted}" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="21" x2="16" y2="21" stroke="${C.muted}" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <textarea id="chat-input" rows="1" placeholder="Schreib auf Deutsch… (or use mic)" style="flex:1;background:${C.card};border:1px solid ${C.border};border-radius:14px;padding:11px 14px;color:${C.text};font-size:15px;resize:none;font-family:inherit;line-height:1.5;max-height:120px;overflow-y:auto;"></textarea>
      <button id="send-btn" style="background:${C.amber};border:none;border-radius:14px;padding:11px 18px;cursor:pointer;color:#0f1117;font-weight:700;font-size:16px;">→</button>
    </div>
  </div>`;
}

function renderBubble(m) {
  const isUser = m.role === "user";
  let h = `<div style="display:flex;flex-direction:column;align-items:${isUser?"flex-end":"flex-start"};margin-bottom:16px;">`;
  h += `<div class="serif" style="max-width:78%;background:${isUser?C.amber:C.card};color:${isUser?"#0f1117":C.text};border-radius:${isUser?"18px 18px 4px 18px":"18px 18px 18px 4px"};padding:12px 16px;font-size:15px;line-height:1.6;box-shadow:0 2px 8px rgba(0,0,0,.3);">${esc(m.content)}</div>`;
  if (m.corrections&&m.corrections.length){
    h += `<div style="max-width:78%;margin-top:6px;background:rgba(224,92,92,.08);border:1px solid rgba(224,92,92,.25);border-radius:10px;padding:8px 12px;">`;
    m.corrections.forEach((c,i)=>{ h += `<div style="font-size:13px;color:${C.text};margin-bottom:${i<m.corrections.length-1?4:0}px;"><span style="color:${C.red};text-decoration:line-through;">${esc(c.wrong)}</span> → <span style="color:${C.green};font-weight:600;">${esc(c.right)}</span>${c.note?`<span style="color:${C.muted};"> — ${esc(c.note)}</span>`:""}</div>`; });
    h += `</div>`;
  }
  if (m.tip) h += `<div style="max-width:78%;margin-top:4px;font-size:12px;color:${C.muted};font-style:italic;padding-left:4px;">💡 ${esc(m.tip)}</div>`;
  if (m.translation){ const id="tr"+Math.random().toString(36).slice(2,8); h += `<div style="margin-top:4px;"><button class="trans-toggle" data-target="${id}" style="background:none;border:none;cursor:pointer;color:${C.amberDim};font-size:12px;padding:2px 4px;">show translation</button><div id="${id}" class="hidden" style="font-size:13px;color:${C.muted};font-style:italic;padding-left:4px;">${esc(m.translation)}</div></div>`; }
  if (!isUser&&m.content) h += `<button class="speak-btn" data-text="${esc(m.content)}" style="background:none;border:none;cursor:pointer;color:${C.dimmed};font-size:12px;padding:2px 4px;margin-top:2px;">🔊 listen</button>`;
  if (m.vocab&&m.vocab.length){ h += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;max-width:78%;">`; m.vocab.forEach(v=>{ h += `<div style="background:${C.surface};border:1px solid ${C.border};border-radius:20px;padding:3px 10px;font-size:12px;color:${C.text};"><span style="color:${C.amber};">${esc(v.de)}</span><span style="color:${C.muted};"> — ${esc(v.en)}</span></div>`; }); h += `</div>`; }
  h += `</div>`; return h;
}

function renderTyping(){ return `<div style="display:flex;gap:5px;padding:12px 16px;background:${C.card};border-radius:18px 18px 18px 4px;width:fit-content;">${[0,1,2].map(i=>`<div style="width:7px;height:7px;border-radius:50%;background:${C.muted};animation:typingBounce 1.2s ${i*0.2}s infinite;"></div>`).join("")}</div>`; }

function renderFlashcards(){
  if (!state.flashQueue.length) return shell("Flashcards", `<div style="text-align:center;color:${C.muted};margin-top:80px;">No cards yet — keep chatting to collect vocabulary!</div>`);
  const card = state.flashQueue[state.flashIdx]; const f = state.flashFlipped;
  return shell(`Card ${state.flashIdx+1} / ${state.flashQueue.length}`, `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:24px;padding:24px;">
      <div style="color:${C.muted};font-size:12px;letter-spacing:2px;text-transform:uppercase;">Flashcard Practice</div>
      <div id="flip-card" style="width:300px;min-height:180px;background:${f?C.amber:C.card};border:2px solid ${f?C.amber:C.border};border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4);transition:all .25s;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:${f?"#0f1117":C.muted};margin-bottom:12px;">${f?"English":"German"}</div>
        <div class="serif" style="font-size:22px;color:${f?"#0f1117":C.text};font-weight:600;">${esc(f?card.en:card.de)}</div>
        ${!f?`<div style="color:${C.muted};font-size:12px;margin-top:12px;">tap to reveal</div>`:""}
      </div>
      ${f?`<div style="display:flex;gap:12px;"><button class="flash-result" data-result="got" style="background:none;border:2px solid ${C.green};color:${C.green};border-radius:12px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;">✓ Got it</button><button class="flash-result" data-result="missed" style="background:none;border:2px solid ${C.red};color:${C.red};border-radius:12px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;">✗ Missed</button></div>`:""}
      <button id="flash-skip" style="background:none;border:none;color:${C.muted};font-size:13px;cursor:pointer;text-decoration:underline;">skip</button>
    </div>`);
}

function renderReview(){
  let missedHtml = "";
  if (state.missed.length){
    missedHtml = `<div style="color:${C.text};font-weight:600;">Keep practicing:</div>` +
      state.missed.map(c=>`<div style="background:${C.card};border:1px solid ${C.border};border-radius:10px;padding:10px 16px;display:flex;justify-content:space-between;"><span style="color:${C.amber};">${esc(c.de)}</span><span style="color:${C.muted};">${esc(c.en)}</span></div>`).join("") +
      `<button id="retry-missed" style="width:100%;padding:13px 0;border-radius:12px;border:2px solid ${C.amber};background:none;color:${C.amber};font-weight:700;font-size:15px;cursor:pointer;">Retry Missed Cards</button>`;
  }
  return shell("Session Review", `
    <div style="padding:24px;display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;gap:12px;">
        <div style="flex:1;background:${C.card};border:1px solid ${C.green}33;border-radius:14px;padding:20px;text-align:center;"><div style="font-size:36px;font-weight:700;color:${C.green};">${state.score.got}</div><div style="color:${C.muted};font-size:13px;">Got it</div></div>
        <div style="flex:1;background:${C.card};border:1px solid ${C.red}33;border-radius:14px;padding:20px;text-align:center;"><div style="font-size:36px;font-weight:700;color:${C.red};">${state.score.missed}</div><div style="color:${C.muted};font-size:13px;">Missed</div></div>
      </div>
      ${missedHtml}
      <button id="back-chat" style="width:100%;padding:13px 0;border-radius:12px;border:2px solid ${C.blue};background:none;color:${C.blue};font-weight:700;font-size:15px;cursor:pointer;">Back to Conversation</button>
      <button id="new-conv" style="width:100%;padding:13px 0;border-radius:12px;border:2px solid ${C.dimmed};background:none;color:${C.dimmed};font-weight:700;font-size:15px;cursor:pointer;">New Conversation</button>
    </div>`);
}

function shell(title, inner){
  return `<div style="display:flex;flex-direction:column;height:100vh;">
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid ${C.border};background:${C.surface};">
      <button id="shell-back" style="background:none;border:none;color:${C.muted};cursor:pointer;font-size:20px;">←</button>
      <div style="font-weight:700;font-size:15px;">${esc(title)}</div>
    </div>
    <div style="flex:1;overflow-y:auto;">${inner}</div>
  </div>`;
}

// ── Handlers ────────────────────────────────────────────────────────────────
function attachHandlers() {
  document.querySelectorAll("[data-level]").forEach(b=>b.onclick=()=>{state.level=b.dataset.level;render();});
  document.querySelectorAll("[data-topic]").forEach(b=>b.onclick=()=>{state.topic=b.dataset.topic;render();});
  const gk=document.getElementById("groq-key"); if(gk)gk.oninput=()=>{state.groqKey=gk.value.trim();persist();};
  const gm=document.getElementById("groq-model"); if(gm)gm.oninput=()=>{state.groqModel=gm.value.trim();persist();};
  const start=document.getElementById("start-btn"); if(start)start.onclick=startConversation;
  const back=document.getElementById("back-setup"); if(back)back.onclick=()=>{state.screen="setup";state.messages=[];state.error="";render();};
  const send=document.getElementById("send-btn"); if(send)send.onclick=()=>sendMessage(false);
  const mic=document.getElementById("mic-btn"); if(mic)mic.onclick=toggleMic;
  const ta=document.getElementById("chat-input"); if(ta)ta.onkeydown=(e)=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage(false);}};
  const retry=document.getElementById("retry-btn"); if(retry)retry.onclick=()=>{state.error="";state.messages.length===0?startConversation():sendMessage(true);};
  const oc=document.getElementById("open-cards"); if(oc)oc.onclick=()=>startFlashcards(state.vocab);
  const omd=document.getElementById("open-missed"); if(omd)omd.onclick=()=>startFlashcards(state.missed);
  document.querySelectorAll(".trans-toggle").forEach(b=>b.onclick=()=>{const t=document.getElementById(b.dataset.target);if(t){t.classList.toggle("hidden");b.textContent=t.classList.contains("hidden")?"show translation":"hide translation";}});
  document.querySelectorAll(".speak-btn").forEach(b=>b.onclick=()=>speak(b.dataset.text));
  const flip=document.getElementById("flip-card"); if(flip)flip.onclick=()=>{state.flashFlipped=!state.flashFlipped;render();};
  document.querySelectorAll(".flash-result").forEach(b=>b.onclick=()=>handleFlashResult(b.dataset.result));
  const skip=document.getElementById("flash-skip"); if(skip)skip.onclick=()=>advanceFlash();
  const sb=document.getElementById("shell-back"); if(sb)sb.onclick=()=>{state.screen="chat";render();};
  const rm=document.getElementById("retry-missed"); if(rm)rm.onclick=()=>startFlashcards(state.missed);
  const bc=document.getElementById("back-chat"); if(bc)bc.onclick=()=>{state.screen="chat";render();};
  const nc=document.getElementById("new-conv"); if(nc)nc.onclick=()=>{state.screen="setup";state.messages=[];render();};
}

async function startConversation() {
  if (!state.groqKey) { state.error="Add your Groq API key first."; render(); return; }
  state.error=""; state.messages=[]; state.screen="chat"; state.loading=true; render();
  try {
    const raw = await callGroq([{ role:"user", content:"Start the conversation with a natural German greeting or opening question for this topic." }], buildSystemPrompt(state.level, state.topic));
    const p = parseResponse(raw);
    state.messages.push({ role:"model", content:p.reply||raw, translation:p.translation||"", corrections:[], tip:p.tip||"", vocab:p.vocab||[] });
    collectVocab();
  } catch(e){ state.error=e.message; }
  state.loading=false; render();
}

async function sendMessage(isRetry) {
  const ta=document.getElementById("chat-input");
  let text="";
  if (isRetry){ for(let i=state.messages.length-1;i>=0;i--){ if(state.messages[i].role==="user"){text=state.messages[i].content;break;} } }
  else { text=ta?ta.value.trim():""; }
  if (!text||state.loading) return;
  state.error="";
  if (!isRetry){ state.messages.push({role:"user",content:text}); if(ta)ta.value=""; }
  state.loading=true; render();
  try {
    const history=state.messages.map(m=>({role:m.role,content:m.content}));
    const raw=await callGroq(history, buildSystemPrompt(state.level, state.topic));
    const p=parseResponse(raw);
    state.messages.push({role:"model",content:p.reply||raw,translation:p.translation||"",corrections:p.corrections||[],tip:p.tip||"",vocab:p.vocab||[]});
    collectVocab();
    if (p.reply) speak(p.reply);
  } catch(e){ state.error=e.message; }
  state.loading=false; render();
}

function startFlashcards(cards){ if(!cards||!cards.length)return; state.flashQueue=cards.slice(); state.flashIdx=0; state.flashFlipped=false; state.score={got:0,missed:0}; state.screen="flashcards"; render(); }
function handleFlashResult(result){ const card=state.flashQueue[state.flashIdx]; state.score[result]++; state.missed=state.missed.filter(c=>c.de!==card.de); if(result==="missed")state.missed.push(card); saveMissed(); advanceFlash(); }
function advanceFlash(){ state.flashFlipped=false; if(state.flashIdx+1>=state.flashQueue.length)state.screen="review"; else state.flashIdx++; render(); }

initSpeech();
if (window.speechSynthesis) window.speechSynthesis.getVoices();
render();
</script>
</body>
</html>
